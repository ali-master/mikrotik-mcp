name: ci

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run test:types

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      # schemas/ and docs/tools-reference.md are generated from source.
      # Fail if a tool changed but `bun run gen` wasn't re-run and committed.
      - name: Check generated artifacts are up to date
        run: |
          bun run gen
          git diff --exit-code -- schemas docs/tools-reference.md \
            || (echo "::error::Generated files are stale. Run 'bun run gen' and commit the result." && exit 1)
