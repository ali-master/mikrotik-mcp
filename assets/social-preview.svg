<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MikroTik MCP — the most complete MCP server for MikroTik RouterOS, 715 tools across 113 modules">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E20"/>
      <stop offset="1" stop-color="#070A18"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.22" cy="0.30" r="0.58">
      <stop offset="0" stop-color="#7C6CF0" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7C6CF0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="0.92" cy="0.88" r="0.5">
      <stop offset="0" stop-color="#06B6D4" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="40" y1="20" x2="470" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A855F7"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#E5EDFF"/>
    </radialGradient>
    <linearGradient id="accent" x1="468" y1="0" x2="980" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A855F7"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#5B6478" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <clipPath id="sq">
      <path d="M 492.00,256.00 L 491.68,334.04 L 490.73,361.35 L 489.14,381.37 L 486.91,397.63 L 484.01,411.43 L 480.45,423.42 L 476.20,433.97 L 471.23,443.31 L 465.50,451.62 L 458.99,458.99 L 451.62,465.50 L 443.31,471.23 L 433.97,476.20 L 423.42,480.45 L 411.43,484.01 L 397.63,486.91 L 381.37,489.14 L 361.35,490.73 L 334.04,491.68 L 256.00,492.00 L 177.96,491.68 L 150.65,490.73 L 130.63,489.14 L 114.37,486.91 L 100.57,484.01 L 88.58,480.45 L 78.03,476.20 L 68.69,471.23 L 60.38,465.50 L 53.01,458.99 L 46.50,451.62 L 40.77,443.31 L 35.80,433.97 L 31.55,423.42 L 27.99,411.43 L 25.09,397.63 L 22.86,381.37 L 21.27,361.35 L 20.32,334.04 L 20.00,256.00 L 20.32,177.96 L 21.27,150.65 L 22.86,130.63 L 25.09,114.37 L 27.99,100.57 L 31.55,88.58 L 35.80,78.03 L 40.77,68.69 L 46.50,60.38 L 53.01,53.01 L 60.38,46.50 L 68.69,40.77 L 78.03,35.80 L 88.58,31.55 L 100.57,27.99 L 114.37,25.09 L 130.63,22.86 L 150.65,21.27 L 177.96,20.32 L 256.00,20.00 L 334.04,20.32 L 361.35,21.27 L 381.37,22.86 L 397.63,25.09 L 411.43,27.99 L 423.42,31.55 L 433.97,35.80 L 443.31,40.77 L 451.62,46.50 L 458.99,53.01 L 465.50,60.38 L 471.23,68.69 L 476.20,78.03 L 480.45,88.58 L 484.01,100.57 L 486.91,114.37 L 489.14,130.63 L 490.73,150.65 L 491.68,177.96 L 492.00,256.00 Z"/>
    </clipPath>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#halo)"/>
  <rect width="1280" height="640" fill="url(#halo2)"/>

  <!-- decorative topology, top-right -->
  <g opacity="0.5" stroke="#33405E" stroke-width="2">
    <line x1="1140" y1="118" x2="1208" y2="58"/>
    <line x1="1140" y1="118" x2="1226" y2="168"/>
    <line x1="1140" y1="118" x2="1082" y2="186"/>
  </g>
  <g fill="#16203A" stroke="#4A5982" stroke-width="2">
    <circle cx="1140" cy="118" r="9"/>
    <circle cx="1208" cy="58" r="5.5"/>
    <circle cx="1226" cy="168" r="5.5"/>
    <circle cx="1082" cy="186" r="5.5"/>
  </g>

  <!-- icon tile (squircle) -->
  <g transform="translate(96,166) scale(0.60)" filter="url(#soft)">
    <path clip-path="url(#sq)" fill="url(#tile)" d="M0 0h512v512H0z"/>
    <rect clip-path="url(#sq)" width="512" height="512" fill="url(#sheen)"/>
    <path clip-path="url(#sq)" d="M0 0h512v512H0z" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="3"/>
    <!-- managed-network topology: central hub routing to four nodes -->
    <g stroke="#ffffff" stroke-width="16" stroke-linecap="round" opacity="0.95">
      <line x1="256" y1="256" x2="160" y2="148"/>
      <line x1="256" y1="256" x2="364" y2="156"/>
      <line x1="256" y1="256" x2="156" y2="368"/>
      <line x1="256" y1="256" x2="368" y2="364"/>
    </g>
    <circle cx="256" cy="256" r="44" fill="url(#node)"/>
    <circle cx="160" cy="148" r="26" fill="url(#node)"/>
    <circle cx="364" cy="156" r="26" fill="url(#node)"/>
    <circle cx="156" cy="368" r="26" fill="url(#node)"/>
    <circle cx="368" cy="364" r="26" fill="url(#node)"/>
    <!-- terminal chevron inside the hub: SSH / MCP tooling -->
    <path d="M240 240 L256 256 L240 272" fill="none" stroke="#6366F1" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark + copy -->
  <g font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
    <text x="470" y="208" font-size="22" font-weight="700" letter-spacing="3" fill="#A5B4FC">WORLD'S&#160;&#160;MOST&#160;&#160;COMPLETE&#160;&#160;ROUTEROS&#160;&#160;MCP</text>

    <text x="468" y="298" font-size="84" font-weight="800" fill="#F8FAFC" letter-spacing="-2">mikrotik <tspan fill="url(#accent)">mcp</tspan></text>

    <text x="470" y="352" font-size="28" font-weight="500" fill="#9AA6C0">Read &#38; configure MikroTik RouterOS in natural language.</text>
    <text x="470" y="392" font-size="28" font-weight="500" fill="#9AA6C0">Every RouterOS scope, risk-annotated, in one MCP server.</text>

    <!-- capability chips -->
    <g font-size="26" font-weight="700">
      <rect x="470" y="430" width="158" height="58" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="549" y="468" fill="#C7D2FE" text-anchor="middle">715 tools</text>

      <rect x="644" y="430" width="186" height="58" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="737" y="468" fill="#A5F3FC" text-anchor="middle">113 modules</text>

      <rect x="846" y="430" width="150" height="58" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="921" y="468" fill="#DDD6FE" text-anchor="middle">VPN suite</text>

      <rect x="1012" y="430" width="166" height="58" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="1095" y="468" fill="#BAE6FD" text-anchor="middle">Safe Mode</text>
    </g>

    <text x="470" y="540" font-size="20" font-weight="500" fill="#6B7693">Firewall &#183; Routing &#183; DHCP &#183; DNS &#183; WireGuard &#183; IPsec &#183; L2TP &#183; OpenVPN &#183; QoS &#183; MAC-Telnet</text>
  </g>

  <!-- bottom accent bar -->
  <rect x="0" y="632" width="1280" height="8" fill="url(#bar)"/>
</svg>
