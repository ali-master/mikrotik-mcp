<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MikroTik MCP — Bun-native MCP server for RouterOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.12" cy="0.95" r="0.55">
      <stop offset="0" stop-color="#06B6D4" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="92" y1="180" x2="284" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="node" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#E5EDFF"/>
    </radialGradient>
    <linearGradient id="accent" x1="360" y1="0" x2="980" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5B4FC"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#5B6478" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>

  <!-- decorative topology in the corner -->
  <g opacity="0.5" stroke="#334155" stroke-width="2">
    <line x1="1120" y1="120" x2="1190" y2="60"/>
    <line x1="1120" y1="120" x2="1210" y2="170"/>
    <line x1="1120" y1="120" x2="1060" y2="190"/>
  </g>
  <g opacity="0.7" fill="#1E293B" stroke="#475569" stroke-width="2">
    <circle cx="1120" cy="120" r="10"/>
    <circle cx="1190" cy="60" r="6"/>
    <circle cx="1210" cy="170" r="6"/>
    <circle cx="1060" cy="190" r="6"/>
  </g>

  <!-- icon tile -->
  <g transform="translate(96,180)">
    <rect x="0" y="0" width="192" height="192" rx="46" fill="url(#tile)"/>
    <g stroke="#ffffff" stroke-width="7.5" stroke-linecap="round" opacity="0.95">
      <line x1="96" y1="96" x2="60" y2="55"/>
      <line x1="96" y1="96" x2="137" y2="58"/>
      <line x1="96" y1="96" x2="58" y2="139"/>
      <line x1="96" y1="96" x2="139" y2="137"/>
    </g>
    <circle cx="96" cy="96" r="17" fill="url(#node)"/>
    <circle cx="60" cy="55" r="10" fill="url(#node)"/>
    <circle cx="137" cy="58" r="10" fill="url(#node)"/>
    <circle cx="58" cy="139" r="10" fill="url(#node)"/>
    <circle cx="139" cy="137" r="10" fill="url(#node)"/>
    <path d="M89 88 L96 96 L89 104" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
    <text x="330" y="250" font-size="92" font-weight="800" fill="#F8FAFC" letter-spacing="-2.5">mikrotik <tspan fill="url(#accent)">mcp</tspan></text>
    <text x="334" y="312" font-size="34" font-weight="600" fill="#94A3B8">Bun-native MCP server for MikroTik RouterOS</text>

    <!-- feature chips -->
    <g font-size="24" font-weight="700">
      <g>
        <rect x="334" y="360" width="184" height="52" rx="26" fill="#1E293B" stroke="#334155"/>
        <text x="426" y="394" fill="#C7D2FE" text-anchor="middle">310 tools</text>
      </g>
      <g>
        <rect x="534" y="360" width="160" height="52" rx="26" fill="#1E293B" stroke="#334155"/>
        <text x="614" y="394" fill="#A5F3FC" text-anchor="middle">VPN suite</text>
      </g>
      <g>
        <rect x="710" y="360" width="206" height="52" rx="26" fill="#1E293B" stroke="#334155"/>
        <text x="813" y="394" fill="#DDD6FE" text-anchor="middle">SSH &#183; Safe Mode</text>
      </g>
    </g>

    <text x="334" y="470" font-size="22" font-weight="500" fill="#64748B">Firewall &#183; Routing &#183; DHCP &#183; DNS &#183; WireGuard &#183; IPsec &#183; L2TP &#183; OpenVPN &#183; QoS</text>
  </g>

  <!-- bottom accent bar -->
  <rect x="0" y="632" width="1280" height="8" fill="url(#accent)"/>
</svg>
