<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MikroTik MCP icon">
  <defs>
    <linearGradient id="tile" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="sheen" x1="40" y1="32" x2="160" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="node" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#E5EDFF"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0B1020" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="16" y="16" width="224" height="224" rx="54" fill="url(#tile)"/>
  <rect x="16" y="16" width="224" height="224" rx="54" fill="url(#sheen)"/>

  <!-- managed-network topology: a central hub routing to four nodes -->
  <g stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.95" filter="url(#soft)">
    <line x1="128" y1="128" x2="80" y2="74"/>
    <line x1="128" y1="128" x2="182" y2="78"/>
    <line x1="128" y1="128" x2="78" y2="184"/>
    <line x1="128" y1="128" x2="184" y2="182"/>
  </g>

  <g filter="url(#soft)">
    <circle cx="128" cy="128" r="22" fill="url(#node)"/>
    <circle cx="80" cy="74" r="13" fill="url(#node)"/>
    <circle cx="182" cy="78" r="13" fill="url(#node)"/>
    <circle cx="78" cy="184" r="13" fill="url(#node)"/>
    <circle cx="184" cy="182" r="13" fill="url(#node)"/>
  </g>

  <!-- terminal chevron inside the hub: signals SSH / MCP tooling -->
  <path d="M120 120.5 L127.5 128 L120 135.5" fill="none" stroke="#6366F1" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
